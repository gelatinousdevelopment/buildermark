<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <style>
            :root {
                --accent-color: light-dark(#0066cc, #4d9aff);
                --accent-color-darker: light-dark(#0055aa, #3d88ee);
                --accent-color-darkest: light-dark(#003377, #9ecdff);
                --accent-color-ultralight: light-dark(#eff7ff, #002b5e);
                --accent-color-divider: light-dark(#9fbbd6, #3a5a7a);
                --color-text: light-dark(#444, #d4d4d4);
                --color-text-faded: light-dark(#888, #777);
                --color-text-secondary: light-dark(#666, #999);
                --color-text-tertiary: light-dark(#888, #777);
                --color-text-strong: light-dark(#333, #e0e0e0);
                --color-divider: light-dark(#bbb, #3a3a3e);
                --color-border-light: light-dark(#eee, #333);
                --color-border-medium: light-dark(#ccc, #444);
                --color-border-input: light-dark(#aaa, #666);
                --color-status-green: light-dark(#55bb33, #55bb33);
                --color-status-yellow: light-dark(#f8d233, #f8d233);
                --color-status-red: light-dark(#dd5555, #dd5555);

                --color-background-content: light-dark(#fff, #222226);
                --color-background-page: light-dark(#fcfcfc, #1a1a1e);
                --color-background-empty: light-dark(#f0f0f0, #2a2a2e);
                --color-background-project-header: light-dark(#fff, #222226);
                --color-background-elevated: light-dark(#fbfbfb, #2a2a2e);
                --color-background-subtle: light-dark(#fafafa, #262628);
                --color-background-surface: light-dark(#fff, #2e2e32);
                --color-alternate-table-row-background: light-dark(#fcfcfc, #262628);
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                width: 280px;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                font-size: 13px;
                background: var(--color-background-page);
                color: var(--color-text);
            }
            .header {
                padding: 8px 1rem 0px 1rem;
                border-bottom: 2px solid var(--color-text);
            }
            .header svg {
                display: block;
                height: 30px;
                width: auto;
                color: var(--color-text);
                fill: var(--color-text);
            }
            .section {
                padding: 1rem 1rem 0 1rem;
            }
            .section:last-of-type {
                border-bottom: none;
                padding-bottom: 1rem;
            }
            .label {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: #888;
                margin-bottom: 6px;
            }
            .status-row {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }
            .status-dot.green {
                background: var(--color-status-green);
            }
            .status-dot.red {
                background: var(--color-status-red);
            }
            .status-dot.yellow {
                background: var(--color-status-yellow);
            }
            .status-dot.blue {
                background: var(--accent-color);
            }
            .status-dot.gray {
                background: var(--color-text-faded);
            }
            .status-text {
                color: var(--color-text);
            }
            .open-link {
                display: block;
                padding: 8px 12px;
                background: var(--accent-color);
                color: var(--accent-color-ultralight);
                text-decoration: none;
                border-radius: 6px;
                text-align: center;
                font-weight: 500;
                transition: background 0.15s;
            }
            .open-link:hover {
                background: var(--accent-color-darker);
            }
            .settings-row {
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .settings-row input[type="checkbox"] {
                margin: 0;
            }
            .settings-row label {
                font-size: 12px;
                color: var(--color-text-secondary);
                cursor: pointer;
                user-select: none;
            }
            .import-btn {
                margin-left: auto;
                padding: 3px 10px;
                background: var(--accent-color);
                color: var(--accent-color-ultralight);
                border: none;
                border-radius: 4px;
                font-weight: 500;
                font-size: 11px;
                cursor: pointer;
                transition: background 0.15s;
                flex-shrink: 0;
            }
            .import-btn:hover {
                background: var(--accent-color-darker);
            }
            .import-btn.hidden {
                display: none;
            }
        </style>
    </head>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zrate</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1a1a1a; background: #f5f5f5; }
header { background: #111; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
header h1 { font-size: 18px; font-weight: 600; }
header a { color: #aaa; text-decoration: none; font-size: 14px; }
header a:hover { color: #fff; }
main { max-width: 960px; margin: 24px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; margin-bottom: 16px; overflow: hidden; }
.card-header { padding: 12px 16px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.card-header h2 { font-size: 15px; font-weight: 600; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
th { font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
tr:last-child td { border-bottom: none; }
a.link { color: #0066cc; text-decoration: none; }
a.link:hover { text-decoration: underline; }
.badge { display: inline-block; background: #e8e8e8; color: #333; font-size: 12px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.stars { color: #f59e0b; letter-spacing: 1px; }
.rating-note { color: #666; font-size: 12px; margin-left: 4px; }
.dim { color: #999; font-size: 13px; }
.turn { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
.turn:last-child { border-bottom: none; }
.turn-role { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.turn-role.user { color: #0066cc; }
.turn-role.agent { color: #16a34a; }
.turn-content { white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.5; font-family: "SF Mono", Monaco, Consolas, monospace; }
.empty { color: #999; font-style: italic; padding: 24px; text-align: center; }
.breadcrumb { font-size: 13px; margin-bottom: 16px; color: #666; }
.breadcrumb a { color: #0066cc; text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.path { font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1><a href="#/" style="color:inherit;text-decoration:none;">zrate</a></h1>
</header>
<main id="app">Loading...</main>
<script>
const app = document.getElementById('app');

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function stars(n) {
  return '<span class="stars">' + '\u2605'.repeat(n) + '\u2606'.repeat(5 - n) + '</span>';
}

function shortId(id) {
  return id && id.length > 12 ? id.slice(0, 12) + '\u2026' : (id || '');
}

function fmtTime(t) {
  if (!t) return '';
  return new Date(typeof t === 'number' ? t : t).toLocaleString();
}

async function api(path) {
  const res = await fetch('/api/v1/' + path);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'API error');
  return json.data;
}

// --- Views ---

async function viewHome() {
  const projects = await api('projects');
  if (projects.length === 0) {
    app.innerHTML = '<div class="empty">No projects yet</div>';
    return;
  }
  const details = await Promise.all(projects.map(p => api('projects/' + p.id)));
  let html = '';
  for (const p of details) {
    html += '<div class="card"><div class="card-header"><h2 class="path">' + esc(p.path) + '</h2>' +
      '<span class="badge">' + p.conversations.length + ' conversation' + (p.conversations.length !== 1 ? 's' : '') + '</span></div>';
    if (p.conversations.length === 0) {
      html += '<div class="empty">No conversations</div>';
    } else {
      html += '<table><thead><tr><th>Conversation</th><th>Agent</th><th>Ratings</th></tr></thead><tbody>' +
        p.conversations.map(c => {
          const ratingsHtml = c.ratings.length > 0
            ? c.ratings.map(r =>
                stars(r.rating) + (r.note ? '<span class="rating-note">(' + esc(r.note) + ')</span>' : '')
              ).join(' &nbsp; ')
            : '<span class="dim">none</span>';
          return '<tr><td><a class="link" href="#/conversations/' + esc(c.id) + '">' + esc(shortId(c.id)) + '</a></td>' +
            '<td>' + esc(c.agent) + '</td>' +
            '<td>' + ratingsHtml + '</td></tr>';
        }).join('') +
        '</tbody></table>';
    }
    html += '</div>';
  }
  app.innerHTML = html;
}

async function viewConversation(id) {
  const c = await api('conversations/' + id);
  let html =
    '<div class="breadcrumb"><a href="#/">Projects</a> / Conversation ' + esc(shortId(c.id)) + '</div>';

  if (c.ratings.length > 0) {
    html += '<div class="card"><div class="card-header"><h2>Ratings</h2></div>' +
      '<table><thead><tr><th>Rating</th><th>Note</th><th>Time</th></tr></thead><tbody>' +
      c.ratings.map(r =>
        '<tr><td>' + stars(r.rating) + '</td>' +
        '<td>' + esc(r.note || '\u2014') + '</td>' +
        '<td class="dim">' + esc(fmtTime(r.createdAt)) + '</td></tr>'
      ).join('') +
      '</tbody></table></div>';
  }

  if (c.turns.length > 0) {
    html += '<div class="card"><div class="card-header"><h2>Turns</h2>' +
      '<span class="badge">' + c.turns.length + '</span></div>' +
      c.turns.map(t =>
        '<div class="turn"><div class="turn-role ' + esc(t.role) + '">' + esc(t.role) +
        ' <span class="dim" style="text-transform:none;font-weight:400;">' + esc(fmtTime(t.timestamp)) + '</span></div>' +
        '<div class="turn-content">' + esc(t.content) + '</div></div>'
      ).join('') +
      '</div>';
  } else {
    html += '<div class="empty">No turns recorded</div>';
  }

  app.innerHTML = html;
}

// --- Router ---

async function route() {
  const hash = location.hash || '#/';
  try {
    if (hash.startsWith('#/conversations/')) {
      await viewConversation(hash.slice('#/conversations/'.length));
    } else {
      await viewHome();
    }
  } catch (e) {
    app.innerHTML = '<div class="empty">Error: ' + esc(e.message) + '</div>';
    console.error(e);
  }
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>

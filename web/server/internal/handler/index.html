<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>zrate — Ratings Dashboard</title>
</head>
<body>
<h1>zrate Dashboard</h1>
<p>Auto-refreshes every 30s · <span id="count">0</span> ratings</p>
<table border="1">
  <thead>
    <tr><th>Rating</th><th>Note</th><th>Conversation</th><th>Time</th></tr>
  </thead>
  <tbody id="tbody">
    <tr><td colspan="4">Loading...</td></tr>
  </tbody>
</table>
<script>
async function load() {
  try {
    const res = await fetch('/api/v1/ratings?limit=100');
    const json = await res.json();
    if (!json.ok) return;
    const data = json.data;
    document.getElementById('count').textContent = data.length;
    const tbody = document.getElementById('tbody');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4">No ratings yet</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(r => {
      const d = new Date(r.createdAt);
      const time = d.toLocaleString();
      const conv = r.conversationId.length > 12 ? r.conversationId.slice(0, 12) + '...' : r.conversationId;
      return '<tr>' +
        '<td>' + r.rating + '/5</td>' +
        '<td>' + esc(r.note || '—') + '</td>' +
        '<td title="' + esc(r.conversationId) + '">' + esc(conv) + '</td>' +
        '<td>' + esc(time) + '</td>' +
        '</tr>';
    }).join('');
  } catch (e) {
    console.error('Failed to load ratings:', e);
  }
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
load();
setInterval(load, 30000);
</script>
</body>
</html>
